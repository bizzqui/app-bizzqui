<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZZqui - E-Mail bestätigt</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: #f5f5f5;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 440px;
            margin: 60px auto 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #2B6CB0;
            margin-bottom: 24px;
        }
        .checkmark {
            width: 64px;
            height: 64px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            font-size: 32px;
        }
        h1 {
            color: #1a1a1a;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #555;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .redirect-note {
            color: #888;
            font-size: 13px;
            margin-top: 20px;
        }
        .button {
            display: inline-block;
            background: #2B6CB0;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 24px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #225694;
        }
    </style>
    <script>
        // Redirect to broker portal login after 3 seconds
        var portalUrl = 'https://succession-matcher-dev.flutterflow.app/';
        setTimeout(function() {
            window.location.href = portalUrl;
        }, 3000);
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">BIZZqui</div>
        <div class="checkmark">✓</div>
        <h1>E-Mail-Adresse bestätigt</h1>
        <p>Deine neue E-Mail-Adresse wurde erfolgreich bestätigt.</p>
        <p>Du kannst dich jetzt mit deiner neuen E-Mail-Adresse im Beraterportal einloggen.</p>
        <a href="https://succession-matcher-dev.flutterflow.app/" class="button">Zum Beraterportal</a>
        <p class="redirect-note">Du wirst in wenigen Sekunden automatisch weitergeleitet...</p>
    </div>
</body>
</html>
